<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="140" viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
  <!-- Card Background -->
  <rect width="100" height="140" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
  
  <!-- Corner Index -->
  <text x="12" y="28" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">4</text>
  <text x="12" y="48" font-family="Arial, sans-serif" font-size="16" fill="#4a3728">🪵</text>
  
  <!-- Center Suit Symbol (Large) -->
  <text x="50" y="80" font-family="Arial, sans-serif" font-size="50" text-anchor="middle" fill="#4a3728" opacity="0.8">🪵</text>
  
  <!-- Bottom Corner (Rotated) -->
  <text x="88" y="112" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e" text-anchor="end" transform="rotate(180 88 112)">4</text>
  <text x="88" y="92" font-family="Arial, sans-serif" font-size="16" fill="#4a3728" text-anchor="end" transform="rotate(180 88 92)">🪵</text>
  
  <!-- Decorative Border -->
  <rect x="5" y="5" width="90" height="130" rx="5" fill="none" stroke="#4a3728" stroke-width="1" opacity="0.3"/>
</svg>